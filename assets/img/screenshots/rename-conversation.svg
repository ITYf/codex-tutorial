<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-labelledby="title desc">
  <title id="title">Codex 重命名对话示意图</title>
  <desc id="desc">展示 Codex 双击对话后出现的重命名对话弹窗。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f1d23" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="760" height="340" rx="26" fill="#fff8f9"/>
  <rect x="34" y="34" width="692" height="272" rx="24" fill="#fff" filter="url(#shadow)"/>
  <text x="66" y="94" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="800" fill="#15191d">重命名对话</text>
  <text x="682" y="88" font-family="Arial, Microsoft YaHei, sans-serif" font-size="30" fill="#3d444a">×</text>
  <text x="66" y="136" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" fill="#8b8f96">保持简短且易于识别</text>
  <rect x="66" y="166" width="628" height="64" rx="16" fill="#fff" stroke="#e6e2e4" stroke-width="2"/>
  <rect x="90" y="182" width="306" height="32" rx="2" fill="#326ee6"/>
  <text x="94" y="206" font-family="Arial, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#fff">生成Codex操作手册静态页</text>
  <rect x="456" y="252" width="112" height="54" rx="16" fill="#fff" stroke="#e6e2e4"/>
  <text x="493" y="286" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" fill="#15191d">取消</text>
  <rect x="590" y="252" width="112" height="54" rx="16" fill="#15191d"/>
  <text x="627" y="286" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#fff">保存</text>
</svg>