<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">Codex 搜索对话示意图</title>
  <desc id="desc">展示 Codex 搜索对话弹窗、近期对话和快捷键编号。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f1d23" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="row" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="920" height="320" rx="28" fill="#fff8f9"/>
  <rect x="26" y="24" width="868" height="272" rx="22" fill="#fff" filter="url(#shadow)"/>
  <text x="56" y="70" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#7a5f69">搜索对话</text>
  <line x1="56" y1="92" x2="850" y2="92" stroke="#f0cacf" stroke-width="2"/>
  <text x="56" y="126" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#8c7b82">近期对话</text>
  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <rect x="56" y="144" width="808" height="54" rx="12" fill="url(#row)"/>
    <text x="102" y="179" font-size="23" font-weight="700" fill="#2f1d23">生成Codex操作手册静态页</text>
    <text x="698" y="178" font-size="22" fill="#8c7b82">Codex配置</text>
    <text x="820" y="178" font-size="22" fill="#7a5f69">Ctrl+1</text>
    <rect x="56" y="202" width="808" height="42" rx="10" fill="#fff"/>
    <text x="102" y="231" font-size="22" fill="#2f1d23">安装并订阅 Codex</text>
    <text x="698" y="231" font-size="21" fill="#a09198">Codex配置</text>
    <text x="820" y="231" font-size="21" fill="#a09198">Ctrl+2</text>
    <rect x="56" y="248" width="808" height="42" rx="10" fill="#fff"/>
    <text x="102" y="277" font-size="22" fill="#2f1d23">注册 Gmail</text>
    <text x="698" y="277" font-size="21" fill="#a09198">Codex配置</text>
    <text x="820" y="277" font-size="21" fill="#a09198">Ctrl+3</text>
  </g>
</svg>