<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex 工作空间任务状态示意图</title>
  <desc id="desc">展示 Codex 工作空间中等待批准、进行中等任务状态。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6fbff"/>
      <stop offset="1" stop-color="#f4ffd8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2f1d23" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="560" height="560" rx="24" fill="#fff8f9"/>
  <rect x="20" y="20" width="500" height="500" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <g font-family="Arial, Microsoft YaHei, sans-serif" fill="#233746">
    <text x="52" y="62" font-size="22">Codex 移动版</text>
    <text x="26" y="142" font-size="24" fill="#8ba0a8">项目</text>
    <rect x="28" y="174" width="464" height="54" rx="14" fill="#d8eeed"/>
    <path d="M48 194h24l9 9v18H48z" fill="none" stroke="#60747c" stroke-width="2.4"/>
    <text x="92" y="209" font-size="23" fill="#60747c">Codex使用教程</text>
    <text x="268" y="210" font-size="26" fill="#60747c">⌄</text>
    <text x="404" y="208" font-size="24" fill="#60747c">...</text>
    <path d="M462 192c12-12 28-3 18 12l-22 22h-13l3-13z" fill="none" stroke="#b4c3c8" stroke-width="2.5"/>

    <rect x="28" y="236" width="464" height="54" rx="14" fill="#d8eeed"/>
    <text x="92" y="271" font-size="23">世界杯小组赛排名</text>
    <rect x="438" y="240" width="54" height="54" rx="3" fill="none" stroke="#ff4f67" stroke-width="7"/>
    <circle cx="465" cy="267" r="10" fill="none" stroke="#60747c" stroke-width="3" stroke-dasharray="22 12"/>

    <rect x="28" y="296" width="464" height="54" rx="14" fill="#d8eeed"/>
    <text x="92" y="331" font-size="23">生成Codex操作手册...</text>
    <rect x="334" y="300" width="150" height="46" rx="2" fill="none" stroke="#ff4f67" stroke-width="7"/>
    <rect x="348" y="307" width="118" height="32" rx="6" fill="#d7fff0"/>
    <text x="365" y="330" font-size="21" font-weight="800" fill="#12a35e">等待批准</text>
    <circle cx="465" cy="323" r="10" fill="none" stroke="#60747c" stroke-width="3" stroke-dasharray="22 12"/>

    <rect x="28" y="356" width="464" height="54" rx="14" fill="transparent"/>
    <text x="92" y="391" font-size="23">查询上海天气</text>
    <rect x="438" y="360" width="54" height="54" rx="3" fill="none" stroke="#ff4f67" stroke-width="7"/>
    <circle cx="465" cy="387" r="8" fill="#2f8cff"/>

    <text x="92" y="451" font-size="23">查询当前时间</text>
    <text x="430" y="451" font-size="21" fill="#7d8c94">6 分</text>
    <text x="92" y="510" font-size="23">安装并订阅 Codex</text>
    <text x="410" y="510" font-size="21" fill="#7d8c94">17 小时</text>
  </g>
