<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex 权限管理下拉菜单示意图</title>
  <desc id="desc">展示 Codex 输入框下方的请求批准、替我审批、完全访问权限选项。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f1d23" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="920" height="560" rx="26" fill="#fff8f9"/>
  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <text x="52" y="72" font-size="36" fill="#15191d">我们应该在Codex使用教程中做些什么？</text>
    <rect x="32" y="148" width="760" height="132" rx="22" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="56" y="194" font-size="20" fill="#c3c3c3">随心输入</text>
    <text x="56" y="252" font-size="32" fill="#8b8f96">＋</text>
    <rect x="94" y="226" width="150" height="46" rx="23" fill="#f0f0f0"/>
    <text x="116" y="256" font-size="20" fill="#8b8f96">✋ 请求批准⌄</text>
    <text x="602" y="254" font-size="20" fill="#15191d">5.5  中⌄</text>
    <text x="728" y="254" font-size="24" fill="#8b8f96">↑</text>
    <rect x="104" y="270" width="470" height="258" rx="14" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="126" y="308" font-size="19" fill="#8b8f96">应如何批准 Codex 操作?</text>
    <text x="392" y="308" font-size="19" fill="#8b8f96">了解更多</text>
    <text x="126" y="354" font-size="24" fill="#15191d">✋</text>
    <text x="172" y="350" font-size="22" font-weight="700" fill="#15191d">请求批准</text>
    <text x="172" y="382" font-size="20" fill="#8b8f96">编辑外部文件和使用互联网时始终询问</text>
    <text x="536" y="366" font-size="28" fill="#495057">✓</text>
    <text x="126" y="424" font-size="24" fill="#15191d">🛡</text>
    <text x="172" y="420" font-size="22" font-weight="700" fill="#15191d">替我审批</text>
    <text x="172" y="452" font-size="20" fill="#8b8f96">仅对检测到的风险操作请求批准</text>
    <text x="126" y="494" font-size="24" fill="#15191d">🛡</text>
    <text x="172" y="490" font-size="22" font-weight="700" fill="#15191d">完全访问权限</text>
    <text x="172" y="522" font-size="20" fill="#8b8f96">可不受限制地访问互联网和您电脑上的任何文件</text>
  </g>
</svg>