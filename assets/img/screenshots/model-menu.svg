<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex 模型选择下拉菜单示意图</title>
  <desc id="desc">展示 Codex 中推理强度、模型和速度的选择菜单。</desc>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f1d23" flood-opacity="0.12"/></filter></defs>
  <rect width="920" height="560" rx="26" fill="#fff8f9"/>
  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <text x="18" y="58" font-size="34" fill="#15191d">我们应该在Codex使用教程中做些什么？</text>
    <rect x="0" y="126" width="805" height="148" rx="22" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="18" y="170" font-size="20" fill="#c3c3c3">随心输入</text>
    <text x="18" y="238" font-size="30" fill="#8b8f96">＋</text>
    <text x="70" y="238" font-size="20" fill="#8b8f96">✋ 请求批准⌄</text>
    <rect x="570" y="216" width="108" height="44" rx="22" fill="#f0f0f0"/>
    <text x="592" y="246" font-size="22" fill="#15191d">5.5 中⌄</text>
    <text x="710" y="246" font-size="24" fill="#8b8f96">♬</text>
    <circle cx="770" cy="238" r="28" fill="#8c8f94"/><text x="760" y="248" font-size="28" fill="#fff">↑</text>
    <rect x="0" y="274" width="805" height="62" fill="#f5f5f5"/>
    <text x="18" y="312" font-size="20" fill="#8b8f96">▢ Codex使用教程⌄</text>
    <rect x="572" y="260" width="316" height="292" rx="14" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="592" y="300" font-size="20" fill="#8b8f96">推理</text>
    <text x="592" y="344" font-size="22" fill="#15191d">低</text>
    <rect x="578" y="358" width="298" height="44" rx="12" fill="#f0f0f0"/>
    <text x="592" y="388" font-size="22" fill="#15191d">中</text><text x="844" y="389" font-size="26" fill="#15191d">✓</text>
    <text x="592" y="434" font-size="22" fill="#15191d">高</text>
    <text x="592" y="480" font-size="22" fill="#15191d">超高</text>
    <line x1="592" y1="504" x2="850" y2="504" stroke="#e6e2e4"/>
    <text x="592" y="534" font-size="22" fill="#15191d">GPT-5.5</text><text x="842" y="534" font-size="24" fill="#8b8f96">›</text>
    <text x="592" y="556" font-size="22" fill="#15191d">速度</text><text x="842" y="556" font-size="24" fill="#8b8f96">›</text>
  </g>
</svg>