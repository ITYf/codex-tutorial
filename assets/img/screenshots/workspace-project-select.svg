<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">Codex 项目归属对话示意图</title>
  <desc id="desc">展示在 Codex 输入框下方通过项目下拉框选择项目或不使用项目。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2f1d23" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="920" height="500" rx="26" fill="#fff8f9"/>
  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <text x="246" y="70" font-size="32" font-weight="500" fill="#15191d">我们应该在Codex使用教程中做些什么？</text>
    <rect x="96" y="120" width="728" height="116" rx="20" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="126" y="154" font-size="18" fill="#c2c2c2">随心输入</text>
    <text x="126" y="210" font-size="28" fill="#8b8f96">＋</text>
    <text x="170" y="208" font-size="18" fill="#8b8f96">请求批准⌄</text>
    <text x="744" y="208" font-size="18" fill="#15191d">5.5 中⌄</text>
    <rect x="96" y="236" width="728" height="52" fill="#f2f2f2"/>
    <rect x="112" y="248" width="168" height="34" rx="17" fill="#e9e9e9"/>
    <path d="M126 258h18l7 7v13h-25z" fill="none" stroke="#7b848a" stroke-width="2"/>
    <text x="154" y="271" font-size="18" fill="#7b848a">Codex使用教程</text>
    <text x="272" y="271" font-size="22" fill="#7b848a">⌄</text>
    <path d="M316 260 L260 276" stroke="#ff4f55" stroke-width="4" marker-end="url(#arrow)"/>
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ff4f55"/></marker></defs>
    <text x="340" y="266" font-size="26" fill="#ff4f55">点击下拉框</text>
    <rect x="110" y="286" width="306" height="194" rx="14" fill="#fff" stroke="#e6e2e4" filter="url(#shadow)"/>
    <text x="134" y="328" font-size="20" fill="#8b8f96">⌕  搜索项目</text>
    <path d="M136 358h18l7 7v13h-25z" fill="none" stroke="#2f363b" stroke-width="2"/>
    <text x="172" y="374" font-size="21" fill="#15191d">Codex使用教程</text>
    <text x="376" y="374" font-size="24" fill="#495057">✓</text>
    <path d="M136 402h18l7 7v13h-25z" fill="none" stroke="#2f363b" stroke-width="2"/>
    <text x="172" y="418" font-size="21" fill="#15191d">CodeX Space</text>
    <line x1="110" y1="438" x2="416" y2="438" stroke="#f0e8eb"/>
    <path d="M136 454h18l7 7v13h-25z" fill="none" stroke="#2f363b" stroke-width="2"/>
    <text x="172" y="470" font-size="21" fill="#15191d">不使用项目</text>
  </g>
</svg>